<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Madgwick Studio · Onboarding</title>
    <meta name="description" content="Create your Madgwick Studio account and personalise your learning experience in under a minute." />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Madgwick Studio · Join" />
    <meta property="og:description" content="Create your Madgwick Studio account and personalise your learning experience in under a minute." />
    <meta property="og:image"       content="/madgwick-studio-lockup.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preload images that appear later in the flow so they're already
         cached by the time those screens render. -->
    <link rel="preload" as="image" href="/mark.svg" />
    <link rel="preload" as="image" href="/madgwick-studio-lockup.png" />

    <!-- Inter — preconnect first to avoid an extra round-trip, then load the
         stylesheet.  This is non-render-blocking unlike @import inside CSS. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
